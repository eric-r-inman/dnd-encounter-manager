<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Encounter Manager</title>
    <meta name="description" content="Browser-based D&D Encounter Manager for combat tracking">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
    
    <!-- Note: All CSS is loaded via JavaScript for better HMR -->
</head>
<body>
    <!-- Main application container -->
    <div id="app">
        <!-- App content will be loaded here by JavaScript -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-spinner"></div>
            <p>Loading D&D Encounter Manager...</p>
        </div>
    </div>
    
    <!-- Toast container for notifications -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Main application script -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
