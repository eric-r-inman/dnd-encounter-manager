<!-- Combatant Note Modal -->
<div class="modal-overlay" style="display: none;"
    data-modal="combatant-note"
    data-modal-type="form"
    data-modal-category="annotation">
    <div class="modal" style="max-width: 400px;">
        <div class="modal-header">
            <h2>Add Note for <span data-target-name>Combatant</span></h2>
            <button class="modal-close" aria-label="Close modal" data-modal-close>&times;</button>
        </div>
        <form class="modal-body"
            data-modal-form="combatant-note"
            data-form-type="combatant-note"
            novalidate>
            <div class="form-group">
                <label for="combatant-note-text">Note (max 20 characters):</label>
                <input type="text"
                    id="combatant-note-text"
                    name="noteText"
                    maxlength="20"
                    placeholder="Enter a short note..."
                    list="recent-notes-list"
                    autocomplete="off"
                    autofocus
                    required>
                <datalist id="recent-notes-list">
                    <!-- Recent notes will be populated here -->
                </datalist>
                <small style="color: var(--color-text-muted);">
                    <span id="note-char-count">0</span>/20 characters
                </small>
            </div>

            <div class="modal-footer-actions">
                <button type="button" class="btn btn-secondary" data-modal-close>
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                    Save Note
                </button>
                <!-- Batch apply button (hidden by default) -->
                <button type="button"
                        class="btn btn-primary"
                        id="note-batch-apply-btn"
                        style="display: none;"
                        data-action="batch-note">
                    Apply to Selected (<span id="note-batch-count">0</span>)
                </button>
            </div>
        </form>
    </div>
</div>
