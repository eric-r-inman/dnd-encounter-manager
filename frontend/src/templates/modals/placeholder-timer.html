<!-- Placeholder Timer Modal -->
<div class="modal-overlay" style="display: none;"
     data-modal="placeholder-timer"
     data-modal-type="form"
     data-modal-category="status">
    <div class="modal">
        <div class="modal-header">
            <h2>Set Timer for <span data-target-name>Placeholder</span></h2>
            <button class="modal-close" aria-label="Close modal" data-modal-close>&times;</button>
        </div>
        <form class="modal-body" data-modal-form="placeholder-timer" data-form-type="placeholder-timer">
            <div class="form-group">
                <label for="timer-turns">Set Counter (turns):</label>
                <div class="duration-input-group">
                    <button type="button"
                            class="infinity-btn"
                            title="Set infinite duration"
                            data-action="toggle-infinity"
                            data-toggle-target="timer-turns"
                            data-infinity-state="false">∞</button>
                    <input type="number"
                        id="timer-turns"
                        name="turns"
                        placeholder="Enter number of turns"
                        min="0"
                        max="100"
                        value="1">
                </div>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 12px;">
                <span>Countdown on turn:</span>
                <label class="radio-label" style="display: inline-flex; align-items: center; margin-bottom: 0;">
                    <input type="radio" name="expiresAt" value="start" checked>
                    <span>Beginning</span>
                </label>
                <label class="radio-label" style="display: inline-flex; align-items: center; margin-bottom: 0;">
                    <input type="radio" name="expiresAt" value="end">
                    <span>End</span>
                </label>
            </div>
            <div class="form-group">
                <label for="timer-note">Note (optional, max 14 chars):</label>
                <input type="text" id="timer-note" name="note" maxlength="14" placeholder="Short description">
            </div>
            <div class="modal-footer-actions">
                <button type="button" class="btn btn-secondary" data-modal-close>
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                    Set Timer
                </button>
            </div>
        </form>
    </div>
</div>
