<!-- Creature Type Selection Modal -->
<div class="modal-overlay" style="display: none;"
    data-modal="creature-type-selection"
    data-modal-type="form"
    data-modal-category="database">
    <div class="modal modal-small">
        <div class="modal-header">
            <h2>What type of creature?</h2>
            <button class="modal-close" aria-label="Close modal" data-action="cancel-creature-type-selection">&times;</button>
        </div>
        <div class="modal-body" style="padding: var(--spacing-lg);">
            <form id="creature-type-selection-form" data-form-type="creature-type-selection">
                <div style="display: flex; flex-direction: column; gap: var(--spacing-md); margin-bottom: var(--spacing-xl);">
                    <label class="creature-type-option" style="display: flex; align-items: center; justify-content: flex-start; padding: var(--spacing-lg); background: var(--color-bg-secondary); border: 2px solid var(--color-border-muted); border-radius: var(--border-radius); cursor: pointer; transition: all 0.2s ease;">
                        <input type="radio" name="creature-type" value="enemy" id="type-enemy" checked style="width: 20px; height: 20px; margin: 0; margin-right: var(--spacing-md); cursor: pointer; flex-shrink: 0;">
                        <span style="font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); color: var(--color-text-primary);">Enemy/NPC</span>
                    </label>
                    <label class="creature-type-option" style="display: flex; align-items: center; justify-content: flex-start; padding: var(--spacing-lg); background: var(--color-bg-secondary); border: 2px solid var(--color-border-muted); border-radius: var(--border-radius); cursor: pointer; transition: all 0.2s ease;">
                        <input type="radio" name="creature-type" value="player" id="type-player" style="width: 20px; height: 20px; margin: 0; margin-right: var(--spacing-md); cursor: pointer; flex-shrink: 0;">
                        <span style="font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); color: var(--color-text-primary);">Player</span>
                    </label>
                </div>
                <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: var(--spacing-md); padding-top: var(--spacing-md); border-top: 1px solid var(--color-border-muted);">
                    <button type="button" class="btn btn-secondary" data-action="cancel-creature-type-selection">Cancel</button>
                    <button type="submit" class="btn btn-primary" data-action="confirm-creature-type">Continue</button>
                </div>
            </form>
        </div>
    </div>
</div>
