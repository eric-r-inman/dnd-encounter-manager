<!-- Stat Block Parser Modal -->
<div class="modal-overlay" style="display: none;"
    data-modal="stat-block-parser"
    data-modal-type="parser"
    data-modal-category="import">
    <div class="modal modal-large" style="max-width: 1000px;">
        <div class="modal-header">
            <h2>Import from Stat Block</h2>
            <button class="modal-close" aria-label="Close modal" data-action="cancel-stat-block-parser">&times;</button>
        </div>
        <div class="modal-body" style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg); max-height: 80vh; overflow-y: auto;">
            <!-- Left side: Input -->
            <div class="stat-block-input-section">
                <h3 style="margin-bottom: var(--spacing-md);">Paste Stat Block</h3>
                <div class="form-group">
                    <label for="stat-block-text">
                        Paste your stat block text below (supports D&D Beyond, Roll20, or book formats)
                    </label>
                    <textarea id="stat-block-text"
                            rows="20"
                            placeholder="Example:&#10;&#10;Ancient Red Dragon&#10;Gargantuan dragon, chaotic evil&#10;&#10;Armor Class 22 (natural armor)&#10;Hit Points 546 (28d20 + 252)&#10;Speed 40 ft., climb 40 ft., fly 80 ft.&#10;&#10;STR 30 (+10) DEX 10 (+0) CON 29 (+9)..."
                            style="font-family: var(--font-family-mono); font-size: var(--font-size-sm);"></textarea>
                </div>
                <div class="form-group">
                    <label for="stat-block-source">Source Format</label>
                    <select id="stat-block-source">
                        <option value="auto">Auto-detect</option>
                        <option value="dndbeyond">D&D Beyond</option>
                        <option value="roll20">Roll20</option>
                        <option value="book">Book/PDF</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="stat-block-creature-type">Creature Type</label>
                    <select id="stat-block-creature-type">
                        <option value="enemy">Enemy</option>
                        <option value="npc">NPC</option>
                        <option value="player" disabled style="color: var(--color-text-muted); opacity: 0.5;">Player (Coming Soon)</option>
                    </select>
                </div>
                <button class="btn btn-primary" data-action="parse-stat-block">
                    🔍 Parse Stat Block
                </button>
            </div>

            <!-- Right side: Preview -->
<div class="stat-block-preview-section">
    <h3 style="margin-bottom: var(--spacing-md);">Preview</h3>
    <div id="stat-block-preview" style="
        background-color: var(--color-bg-tertiary);
        border-radius: var(--border-radius);
        padding: var(--spacing-lg);
        min-height: 400px;
        max-height: 600px;
        overflow-y: auto;
        overflow-x: hidden;
    ">
        <div class="empty-state" style="text-align: center; color: var(--color-text-muted);">
            <p>Paste a stat block and click "Parse Stat Block" to see a preview</p>
        </div>
    </div>
    <div id="stat-block-errors" style="margin-top: var(--spacing-md); display: none;">
        <!-- ... rest of the error section ... -->
    </div>
</div>
        </div>
        <div class="modal-footer-actions">
            <button type="button" class="btn btn-secondary" data-action="cancel-stat-block-parser">
                Cancel
            </button>
            <button type="button" class="btn btn-success" id="import-parsed-creature" style="display: none;" data-action="import-parsed-creature">
                ✅ Import Creature
            </button>
        </div>
    </div>
</div>
