<!-- Duplicate Combatant Modal -->
<div class="modal-overlay" style="display: none;"
    data-modal="duplicate-combatant"
    data-modal-type="action"
    data-modal-category="management">
    <div class="modal" style="max-width: 500px;">
        <div class="modal-header">
            <h2>Duplicate <span id="duplicate-combatant-name">Combatant</span></h2>
            <button class="modal-close" aria-label="Close modal" data-modal-close>&times;</button>
        </div>
        <div class="modal-body">
            <div class="duplicate-options">
                <button class="btn btn-block btn-success duplicate-option-btn"
                        data-action="duplicate-fresh"
                        style="margin-bottom: var(--spacing-sm);">
                    Reset all statuses, conditions, and HP for new creature
                </button>

                <button class="btn btn-block btn-success duplicate-option-btn"
                        data-action="duplicate-preserve"
                        style="margin-bottom: var(--spacing-sm);">
                    Preserve all statuses, conditions, and HP for new creature
                </button>

                <button class="btn btn-block btn-success duplicate-option-btn"
                        data-action="duplicate-ooze-split">
                    (Oozes) Divide current HP, and retain all status/conditions
                </button>
            </div>
        </div>
    </div>
</div>
