<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <link rel="stylesheet" href="/src/components/dice-roller/dice-roller-standalone.css">
</head>
<body>
    <div id="diceRollerApp"></div>

    <script type="module">
        import { DiceRollerUI } from './src/components/dice-roller/DiceRollerUI.js';
        import { DiceRollerState } from './src/scripts/state/dice-roller-state.js';

        /**
         * Dice Roller Application
         *
         * Modular dice roller application with separation of concerns:
         * - DiceRollerState: State management and roll calculations
         * - DiceRollerUI: UI rendering
         * - Local event handling: User interaction handling
         */

        // Initialize state
        let state = DiceRollerState.init();

        // Get app container
        const appContainer = document.getElementById('diceRollerApp');

        /**
         * Render the application
         */
        function render() {
            DiceRollerUI.update(appContainer, state);
            attachEventListeners();
        }

        /**
         * Attach event listeners to UI elements
         */
        function attachEventListeners() {
            // Dice selection buttons
            const diceButtons = document.querySelectorAll('[data-action="select-dice"]');
            diceButtons.forEach(button => {
                button.addEventListener('click', handleSelectDice);
            });

            // Multiplier input
            const multiplierInput = document.querySelector('[data-action="update-multiplier"]');
            if (multiplierInput) {
                multiplierInput.addEventListener('input', handleUpdateMultiplier);
            }

            // Modifier input
            const modifierInput = document.querySelector('[data-action="update-modifier"]');
            if (modifierInput) {
                modifierInput.addEventListener('input', handleUpdateModifier);
            }

            // Roll buttons
            const rollButton = document.querySelector('[data-action="roll-dice"]');
            if (rollButton) {
                rollButton.addEventListener('click', handleRollDice);
            }

            const advantageButton = document.querySelector('[data-action="roll-advantage"]');
            if (advantageButton) {
                advantageButton.addEventListener('click', handleRollAdvantage);
            }

            const disadvantageButton = document.querySelector('[data-action="roll-disadvantage"]');
            if (disadvantageButton) {
                disadvantageButton.addEventListener('click', handleRollDisadvantage);
            }

            // Clear history button
            const clearButton = document.querySelector('[data-action="clear-history"]');
            if (clearButton) {
                clearButton.addEventListener('click', handleClearHistory);
            }

            // Reroll buttons
            const rerollButtons = document.querySelectorAll('[data-action="reroll"]');
            rerollButtons.forEach(button => {
                button.addEventListener('click', handleReroll);
            });

            // Coin flip buttons (both main button and re-flip buttons in history)
            const coinFlipButtons = document.querySelectorAll('[data-action="flip-coin"]');
            coinFlipButtons.forEach(button => {
                button.addEventListener('click', handleFlipCoin);
            });
        }

        /**
         * Handle dice selection
         * @param {Event} event - Click event
         */
        function handleSelectDice(event) {
            const diceType = parseInt(event.target.dataset.diceType);
            state = DiceRollerState.selectDice(state, diceType);
            render();
        }

        /**
         * Handle multiplier update
         * @param {Event} event - Input event
         */
        function handleUpdateMultiplier(event) {
            const multiplier = parseInt(event.target.value) || 1;
            state = DiceRollerState.updateMultiplier(state, multiplier);
            render();
        }

        /**
         * Handle modifier update
         * @param {Event} event - Input event
         */
        function handleUpdateModifier(event) {
            const modifier = parseInt(event.target.value) || 0;
            state = DiceRollerState.updateModifier(state, modifier);
            render();
        }

        /**
         * Handle normal dice roll
         */
        function handleRollDice() {
            if (state.selectedDiceType === null) {
                alert('Please select a dice type first');
                return;
            }
            state = DiceRollerState.rollDice(state);
            render();
        }

        /**
         * Handle advantage roll
         */
        function handleRollAdvantage() {
            if (state.selectedDiceType !== 20) {
                alert('Advantage is only available for d20 rolls');
                return;
            }
            state = DiceRollerState.rollWithAdvantage(state);
            render();
        }

        /**
         * Handle disadvantage roll
         */
        function handleRollDisadvantage() {
            if (state.selectedDiceType !== 20) {
                alert('Disadvantage is only available for d20 rolls');
                return;
            }
            state = DiceRollerState.rollWithDisadvantage(state);
            render();
        }

        /**
         * Handle clear history
         */
        function handleClearHistory() {
            state = DiceRollerState.clearHistory(state);
            render();
        }

        /**
         * Handle coin flip
         */
        function handleFlipCoin() {
            state = DiceRollerState.flipCoin(state);
            render();
        }

        /**
         * Handle re-roll from history
         * @param {Event} event - Click event
         */
        function handleReroll(event) {
            const button = event.currentTarget;
            const rerollData = JSON.parse(button.dataset.rerollData);

            console.log('🔄 Re-rolling:', rerollData);

            // Update state with roll parameters
            state = DiceRollerState.selectDice(state, rerollData.diceType);
            state = DiceRollerState.updateMultiplier(state, rerollData.multiplier);
            state = DiceRollerState.updateModifier(state, rerollData.modifier);

            // Perform the appropriate type of roll
            if (rerollData.isAdvantage) {
                state = DiceRollerState.rollWithAdvantage(state);
            } else if (rerollData.isDisadvantage) {
                state = DiceRollerState.rollWithDisadvantage(state);
            } else {
                state = DiceRollerState.rollDice(state);
            }

            render();
        }

        /**
         * Execute a roll with provided data
         * Called from auto-roll functionality
         * @param {Object} rollData - Roll parameters
         */
        function executeRoll(rollData) {
            console.log('🎲 Executing auto-roll:', rollData);

            // Update state with roll parameters
            state = DiceRollerState.selectDice(state, rollData.diceType);
            state = DiceRollerState.updateMultiplier(state, rollData.multiplier);
            state = DiceRollerState.updateModifier(state, rollData.modifier);

            // Perform the roll with damage type if provided
            state = DiceRollerState.rollDice(state, rollData.damageType);

            console.log('✅ Roll executed, new history length:', state.rollHistory.length);
            console.log('📜 Latest roll:', state.rollHistory[0]);

            // Render updated state
            render();
        }

        /**
         * Listen for roll commands from parent window
         */
        window.addEventListener('message', (event) => {
            console.log('📨 Message received:', event.data);

            // Verify origin for security
            if (event.origin !== window.location.origin) {
                console.warn('⚠️ Message from wrong origin:', event.origin);
                return;
            }

            if (event.data && event.data.type === 'EXECUTE_ROLL') {
                executeRoll(event.data.data);
            }
        });

        // Initial render
        render();

        /**
         * Notify parent window that dice roller is ready
         */
        function notifyReady() {
            if (window.opener) {
                try {
                    console.log('📢 Sending READY message to parent window');
                    window.opener.postMessage({
                        type: 'DICE_ROLLER_READY'
                    }, window.location.origin);
                } catch (error) {
                    console.error('Failed to send ready message:', error);
                }
            }
        }

        /**
         * Check for pending roll from opener on load
         * This runs after everything is initialized
         */
        function checkPendingRoll() {
            if (window.opener && typeof window.opener.DiceRoller !== 'undefined') {
                try {
                    const pendingRoll = window.opener.DiceRoller.getPendingRoll();
                    if (pendingRoll) {
                        console.log('🔄 Found pending roll on load:', pendingRoll);
                        executeRoll(pendingRoll);
                    } else {
                        console.log('ℹ️ No pending roll found');
                    }
                } catch (error) {
                    console.error('Failed to get pending roll:', error);
                }
            }
        }

        /**
         * Initialize dice roller when ready
         */
        function initialize() {
            // Notify parent that we're ready
            notifyReady();

            // Check for pending rolls (backup method)
            setTimeout(checkPendingRoll, 100);
        }

        // Initialize after a short delay to ensure everything is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(initialize, 50);
            });
        } else {
            // Document already loaded
            setTimeout(initialize, 50);
        }
    </script>
</body>
</html>
