    <div class="modal-overlay" style="display: none;"
        data-modal="edit-creature"
        data-modal-type="form"
        data-modal-category="database">
        <div class="modal modal-large" style="max-height: 85vh;">
            <div class="modal-header">
                <h2 id="edit-creature-form-title">Edit Creature</h2>
                <button class="modal-close" aria-label="Close modal" data-action="cancel-edit-creature">&times;</button>
            </div>
            <form class="modal-body"
                id="edit-creature-form"
                data-modal-form="creature"
                data-form-type="creature"
                novalidate
                style="overflow-y: auto; max-height: calc(85vh - 180px);">
                
                <!-- ==================== BASIC INFORMATION ==================== -->
                <h3 class="form-section-title">Basic Information</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="creature-form-name">Name *</label>
                        <input type="text"
                            id="edit-creature-form-name"
                            name="name"
                           
                            placeholder="e.g., Ancient Red Dragon">
                    </div>
                    <div class="form-group">
                        <label for="creature-form-type">Type *</label>
                        <select id="edit-creature-form-type" name="type">
                            <option value="enemy">Enemy</option>
                            <option value="npc">NPC</option>
                            <option value="player" disabled>Player</option>
                        </select>
                        <div id="edit-creature-form-type-readonly" style="display: none; padding: var(--spacing-sm); background-color: var(--color-bg-hover); border-radius: var(--border-radius); color: var(--color-text-primary); text-transform: capitalize;">
                            Player
                        </div>
                        <input type="hidden" id="edit-creature-form-type-hidden" value="">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="creature-form-size">Size</label>
                        <select id="edit-creature-form-size" name="size">
                            <option value="Tiny">Tiny</option>
                            <option value="Small">Small</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="Large">Large</option>
                            <option value="Huge">Huge</option>
                            <option value="Gargantuan">Gargantuan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="creature-form-race">Race/Type</label>
                        <input type="text" 
                            id="edit-creature-form-race" 
                            name="race" 
                            placeholder="e.g., Dragon">
                    </div>
                    <div class="form-group">
                        <label for="creature-form-subrace">Subrace</label>
                        <input type="text" 
                            id="edit-creature-form-subrace" 
                            name="subrace" 
                            placeholder="e.g., Chromatic">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="creature-form-alignment">Alignment</label>
                        <input type="text" 
                            id="edit-creature-form-alignment" 
                            name="alignment" 
                            placeholder="e.g., Chaotic Evil">
                    </div>
                    <div class="form-group">
                        <label for="creature-form-cr">Challenge Rating</label>
                        <input type="text" 
                            id="edit-creature-form-cr" 
                            name="cr" 
                            placeholder="e.g., 24">
                    </div>
                    <div class="form-group">
                        <label for="creature-form-source">Source</label>
                        <input type="text" 
                            id="edit-creature-form-source" 
                            name="source" 
                            placeholder="e.g., Monster Manual">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="creature-form-description">Description</label>
                    <textarea id="edit-creature-form-description" 
                            name="description" 
                            rows="2" 
                            placeholder="Brief description of the creature"></textarea>
                </div>
                
                <!-- ==================== COMBAT STATISTICS ==================== -->
                <h3 class="form-section-title">Combat Statistics</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="creature-form-ac">Armor Class *</label>
                        <input type="number" 
                            id="edit-creature-form-ac" 
                            name="ac" 
                           
                            min="1" 
                            max="30" 
                            placeholder="22">
                    </div>
                    <div class="form-group">
                        <label for="creature-form-ac-type">AC Type</label>
                        <input type="text" 
                            id="edit-creature-form-ac-type" 
                            name="acType" 
                            placeholder="e.g., Natural Armor">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="creature-form-hp">Hit Points *</label>
                        <input type="number" 
                            id="edit-creature-form-hp" 
                            name="maxHP" 
                           
                            min="1" 
                            max="9999" 
                            placeholder="507">
                    </div>
                    <div class="form-group">
                        <label for="creature-form-hp-formula">HP Formula</label>
                        <input type="text" 
                            id="edit-creature-form-hp-formula" 
                            name="hpFormula" 
                            placeholder="e.g., 26d20 + 234">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="creature-form-initiative-mod">Initiative Modifier</label>
                        <input type="number" 
                            id="edit-creature-form-initiative-mod" 
                            name="initiativeModifier" 
                            placeholder="14">
                    </div>
                    <div class="form-group">
                        <label for="creature-form-initiative-total">Initiative Total</label>
                        <input type="number" 
                            id="edit-creature-form-initiative-total" 
                            name="initiativeTotal" 
                            placeholder="24">
                    </div>
                    <div class="form-group">
                        <label for="creature-form-proficiency">Proficiency Bonus</label>
                        <input type="number" 
                            id="edit-creature-form-proficiency" 
                            name="proficiencyBonus" 
                            placeholder="7">
                    </div>
                </div>
                
                <!-- Speed -->
                <label>Speed</label>
                <div class="form-row">
                    <div class="form-group">
                        <input type="number" 
                            id="edit-creature-form-speed-walk" 
                            name="speedWalk" 
                            placeholder="Walk (ft)">
                    </div>
                    <div class="form-group">
                        <input type="number" 
                            id="edit-creature-form-speed-fly" 
                            name="speedFly" 
                            placeholder="Fly (ft)">
                    </div>
                    <div class="form-group">
                        <input type="number" 
                            id="edit-creature-form-speed-swim" 
                            name="speedSwim" 
                            placeholder="Swim (ft)">
                    </div>
                    <div class="form-group">
                        <input type="number" 
                            id="edit-creature-form-speed-climb" 
                            name="speedClimb" 
                            placeholder="Climb (ft)">
                    </div>
                    <div class="form-group">
                        <input type="number" 
                            id="edit-creature-form-speed-burrow" 
                            name="speedBurrow" 
                            placeholder="Burrow (ft)">
                    </div>
                </div>
                
                <!-- ==================== ABILITY SCORES ==================== -->
                <h3 class="form-section-title">Ability Scores</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>STR</label>
                        <input type="number" id="edit-creature-str-score" name="strScore" placeholder="Score" min="1" max="30">
                        <input type="number" id="edit-creature-str-modifier" name="strModifier" placeholder="Mod" readonly style="background-color: var(--color-bg-hover);">
                    </div>
                    <div class="form-group">
                        <label>DEX</label>
                        <input type="number" id="edit-creature-dex-score" name="dexScore" placeholder="Score" min="1" max="30">
                        <input type="number" id="edit-creature-dex-modifier" name="dexModifier" placeholder="Mod" readonly style="background-color: var(--color-bg-hover);">
                    </div>
                    <div class="form-group">
                        <label>CON</label>
                        <input type="number" id="edit-creature-con-score" name="conScore" placeholder="Score" min="1" max="30">
                        <input type="number" id="edit-creature-con-modifier" name="conModifier" placeholder="Mod" readonly style="background-color: var(--color-bg-hover);">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>INT</label>
                        <input type="number" id="edit-creature-int-score" name="intScore" placeholder="Score" min="1" max="30">
                        <input type="number" id="edit-creature-int-modifier" name="intModifier" placeholder="Mod" readonly style="background-color: var(--color-bg-hover);">
                    </div>
                    <div class="form-group">
                        <label>WIS</label>
                        <input type="number" id="edit-creature-wis-score" name="wisScore" placeholder="Score" min="1" max="30">
                        <input type="number" id="edit-creature-wis-modifier" name="wisModifier" placeholder="Mod" readonly style="background-color: var(--color-bg-hover);">
                    </div>
                    <div class="form-group">
                        <label>CHA</label>
                        <input type="number" id="edit-creature-cha-score" name="chaScore" placeholder="Score" min="1" max="30">
                        <input type="number" id="edit-creature-cha-modifier" name="chaModifier" placeholder="Mod" readonly style="background-color: var(--color-bg-hover);">
                    </div>
                </div>
                
                <!-- ==================== SAVING THROWS ==================== -->
                <h3 class="form-section-title">Saving Throws</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>STR Save</label>
                        <input type="number" id="edit-creature-str-save" name="strSave" placeholder="+10">
                    </div>
                    <div class="form-group">
                        <label>DEX Save</label>
                        <input type="number" id="edit-creature-dex-save" name="dexSave" placeholder="+7">
                    </div>
                    <div class="form-group">
                        <label>CON Save</label>
                        <input type="number" id="edit-creature-con-save" name="conSave" placeholder="+9">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>INT Save</label>
                        <input type="number" id="edit-creature-int-save" name="intSave" placeholder="+4">
                    </div>
                    <div class="form-group">
                        <label>WIS Save</label>
                        <input type="number" id="edit-creature-wis-save" name="wisSave" placeholder="+9">
                    </div>
                    <div class="form-group">
                        <label>CHA Save</label>
                        <input type="number" id="edit-creature-cha-save" name="chaSave" placeholder="+8">
                    </div>
                </div>
                
                <!-- ==================== SKILLS ==================== -->
                <h3 class="form-section-title">Skills</h3>

                <div id="edit-creature-skills-container">
                    <div id="edit-creature-skills-list" class="dynamic-list"></div>
                    <button type="button" class="btn btn-sm btn-secondary" data-action="add-skill">
                        + Add Skill
                    </button>
                </div>
                
                <!-- ==================== RESISTANCES & IMMUNITIES ==================== -->
                <h3 class="form-section-title">Resistances & Immunities</h3>
                
                <div class="form-group">
                    <label>Damage Vulnerabilities</label>
                    <input type="text" id="edit-creature-damage-vulnerabilities" name="damageVulnerabilities" placeholder="e.g., Cold (comma-separated)">
                </div>

                <div class="form-group">
                    <label>Damage Resistances</label>
                    <input type="text" id="edit-creature-damage-resistances" name="damageResistances" placeholder="e.g., Bludgeoning, Piercing (comma-separated)">
                </div>

                <div class="form-group">
                    <label>Damage Immunities</label>
                    <input type="text" id="edit-creature-damage-immunities" name="damageImmunities" placeholder="e.g., Fire, Poison (comma-separated)">
                </div>

                <div class="form-group">
                    <label>Condition Immunities</label>
                    <input type="text" id="edit-creature-condition-immunities" name="conditionImmunities" placeholder="e.g., Charmed, Frightened (comma-separated)">
                </div>
                
                <!-- ==================== SENSES ==================== -->
                <h3 class="form-section-title">Senses</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Blindsight</label>
                        <input type="number" id="edit-creature-blindsight" name="blindsight" placeholder="ft">
                    </div>
                    <div class="form-group">
                        <label>Darkvision</label>
                        <input type="number" id="edit-creature-darkvision" name="darkvision" placeholder="ft">
                    </div>
                    <div class="form-group">
                        <label>Tremorsense</label>
                        <input type="number" id="edit-creature-tremorsense" name="tremorsense" placeholder="ft">
                    </div>
                    <div class="form-group">
                        <label>Truesight</label>
                        <input type="number" id="edit-creature-truesight" name="truesight" placeholder="ft">
                    </div>
                    <div class="form-group">
                        <label>Passive Perception</label>
                        <input type="number" id="edit-creature-passive-perception" name="passivePerception" placeholder="26">
                    </div>
                </div>

                <!-- ==================== LANGUAGES ==================== -->
                <h3 class="form-section-title">Languages</h3>

                <div class="form-group">
                    <input type="text" id="edit-creature-languages" name="languages" placeholder="e.g., Common, Draconic (comma-separated)">
                </div>
                
                <!-- ==================== CHALLENGE RATING DETAILS ==================== -->
                <h3 class="form-section-title">Challenge Rating Details</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>XP</label>
                        <input type="number" id="edit-creature-xp" name="xp" placeholder="62000">
                    </div>
                    <div class="form-group">
                        <label>XP in Lair</label>
                        <input type="number" id="edit-creature-xp-lair" name="xpInLair" placeholder="75000">
                    </div>
                </div>
                
                <!-- ==================== TRAITS ==================== -->
                <h3 class="form-section-title">Traits & Special Abilities</h3>

                <div id="edit-creature-traits-container">
                    <div id="edit-creature-traits-list" class="dynamic-list"></div>
                    <button type="button" class="btn btn-sm btn-secondary" data-action="add-trait">
                        + Add Trait
                    </button>
                </div>

                <!-- ==================== ACTIONS ==================== -->
                <h3 class="form-section-title">Actions</h3>

                <div id="edit-creature-actions-container">
                    <div id="edit-creature-actions-list" class="dynamic-list"></div>
                    <button type="button" class="btn btn-sm btn-secondary" data-action="add-action">
                        + Add Action
                    </button>
                </div>

                <!-- ==================== REACTIONS ==================== -->
                <h3 class="form-section-title">Reactions</h3>

                <div id="edit-creature-reactions-container">
                    <div id="edit-creature-reactions-list" class="dynamic-list"></div>
                    <button type="button" class="btn btn-sm btn-secondary" data-action="add-reaction">
                        + Add Reaction
                    </button>
                </div>

                <!-- ==================== LEGENDARY ACTIONS ==================== -->
                <h3 class="form-section-title">Legendary Actions</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label>Legendary Action Uses</label>
                        <input type="number" id="edit-creature-legendary-uses" name="legendaryUses" placeholder="3" min="1">
                    </div>
                    <div class="form-group">
                        <label>Uses in Lair</label>
                        <input type="number" id="edit-creature-legendary-uses-lair" name="legendaryUsesInLair" placeholder="4" min="1">
                    </div>
                </div>

                <div class="form-group">
                    <label>Legendary Actions Description</label>
                    <textarea id="edit-creature-legendary-description" name="legendaryDescription" rows="2" placeholder="e.g., The creature can take 3 legendary actions..."></textarea>
                </div>

                <div id="edit-creature-legendary-actions-container">
                    <div id="edit-creature-legendary-actions-list" class="dynamic-list"></div>
                    <button type="button" class="btn btn-sm btn-secondary" data-action="add-legendary-action">
                        + Add Legendary Action
                    </button>
                </div>
                
                <!-- ==================== SPELLCASTING ==================== -->
                <details class="form-section-expandable">
                    <summary class="form-section-title-expandable">Spellcasting (Optional)</summary>
                    <div class="form-section-content">
                        <div class="form-group">
                            <label>Spellcasting Ability</label>
                            <select id="edit-creature-spellcasting-ability" name="spellcastingAbility">
                                <option value="">None</option>
                                <option value="int">Intelligence</option>
                                <option value="wis">Wisdom</option>
                                <option value="cha">Charisma</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Spell Attack Bonus</label>
                            <input type="number" id="edit-creature-spell-attack" name="spellAttackBonus" placeholder="+10">
                        </div>

                        <div class="form-group">
                            <label>Spell Save DC</label>
                            <input type="number" id="edit-creature-spell-dc" name="spellSaveDC" placeholder="18">
                        </div>

                        <div class="form-group">
                            <label>Spellcasting Description</label>
                            <textarea id="edit-creature-spellcasting-desc" name="spellcastingDescription" rows="2" placeholder="e.g., The creature is a 17th-level spellcaster..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>Spell List</label>
                            <textarea id="edit-creature-spell-list" name="spellList" rows="4" placeholder="List spells by level (one per line or comma-separated)"></textarea>
                        </div>
                    </div>
                </details>

                <!-- Hidden field for creature ID when editing -->
                <input type="hidden" id="edit-creature-form-id" name="id">
            </form>

            <!-- Fixed footer buttons outside the scrollable form -->
            <div class="modal-footer" style="position: sticky; bottom: 0; background: var(--color-bg-card); padding: var(--spacing-md); border-top: 1px solid var(--color-border-primary); display: flex; gap: var(--spacing-sm); justify-content: flex-end; z-index: 10;">
                <button type="button" class="btn btn-secondary" data-action="cancel-edit-creature">
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary" form="edit-creature-form">
                    <span id="edit-creature-form-submit-text">Commit Changes</span>
                </button>
            </div>
        </div>
    </div>
