<!-- Initiative Modal -->
<div class="modal-overlay" style="display: none;"
     data-modal="quick-initiative"
     data-modal-type="form"
     data-modal-category="combat"
     data-modal-purpose="initiative-management">
    <div class="modal modal-medium">
        <div class="modal-header">
            <h2>⚡ Initiative Manager</h2>
            <button class="modal-close" aria-label="Close modal" data-modal-close>&times;</button>
        </div>
        <div class="modal-body initiative-modal-body">
            <!-- Quick Sort Button -->
            <div class="initiative-section">
                <button type="button"
                        class="btn btn-primary btn-block"
                        data-action="quick-sort-encounter"
                        style="margin-bottom: var(--spacing-md);">
                    🔄 Quick Sort Encounter
                </button>
                <p class="help-text" style="margin: 0 0 var(--spacing-lg) 0; text-align: center; font-size: var(--font-size-sm); color: var(--color-text-muted);">
                    Sort all creatures by their current initiative values
                </p>
            </div>

            <!-- Auto-Roll Buttons -->
            <div class="initiative-section">
                <h3 class="section-heading">Auto-Roll Initiative</h3>
                <div class="button-group-vertical">
                    <button type="button"
                            class="btn btn-success btn-block"
                            data-action="roll-init-single"
                            id="roll-init-single-btn">
                        🎲 Roll Initiative & Sort
                    </button>
                    <button type="button"
                            class="btn btn-success btn-block"
                            data-action="roll-init-all">
                        🎲 Roll Initiative & Sort: All
                    </button>
                    <button type="button"
                            class="btn btn-success btn-block"
                            data-action="roll-init-selected"
                            id="roll-init-selected-btn">
                        🎲 Roll Initiative & Sort: Selected (<span id="init-selected-count">0</span>)
                    </button>
                </div>
                <p class="help-text" style="margin: var(--spacing-sm) 0 0 0; font-size: var(--font-size-xs); color: var(--color-text-muted);">
                    Rolls 1d20 + creature's initiative bonus from stat block
                </p>
            </div>

            <!-- Custom Initiative Entry -->
            <div class="initiative-section">
                <h3 class="section-heading">Custom Initiative</h3>
                <div class="form-group" style="margin-bottom: var(--spacing-sm);">
                    <label for="custom-initiative-value">Initiative Value:</label>
                    <input type="number"
                           id="custom-initiative-value"
                           name="customInitiative"
                           placeholder="Enter 1-99"
                           min="0"
                           max="99"
                           style="width: 120px;">
                </div>
                <div class="button-group-vertical">
                    <button type="button"
                            class="btn btn-info btn-block"
                            data-action="apply-custom-init-single"
                            id="apply-custom-init-single-btn">
                        ✓ Apply and Sort
                    </button>
                    <button type="button"
                            class="btn btn-info btn-block"
                            data-action="apply-custom-init-selected"
                            id="apply-custom-init-selected-btn">
                        ✓ Apply to Selected (<span id="init-custom-selected-count">0</span>) and Sort
                    </button>
                </div>
            </div>

            <!-- Hidden field to track current combatant -->
            <input type="hidden" id="quick-init-combatant-id" name="combatantId">
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-modal-close>Close</button>
        </div>
    </div>
</div>
