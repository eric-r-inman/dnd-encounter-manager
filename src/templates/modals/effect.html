<!-- Set Effect Modal -->
<div class="modal-overlay" style="display: none;"
     data-modal="effect"
     data-modal-type="form"
     data-modal-category="status">
    <div class="modal">
        <div class="modal-header">
            <h2>Set Effect for <span data-target-name>Thorin Ironforge</span></h2>
            <button class="modal-close" aria-label="Close modal" data-modal-close>&times;</button>
        </div>
        <form class="modal-body" data-modal-form="effect" data-form-type="effect-application">
            <div class="form-group">
                <label for="effect-turns">Set Counter (turns):</label>
                <div class="duration-input-group">
                    <button type="button"
                            class="infinity-btn"
                            title="Set infinite duration"
                            data-action="toggle-infinity"
                            data-toggle-target="effect-turns"
                            data-infinity-state="false">∞</button>
                    <input type="number"
                        id="effect-turns"
                        name="turns"
                        placeholder="Enter number of turns"
                        min="0"
                        max="100"
                        value="1">
                </div>
            </div>
            <div class="form-group">
                <label for="custom-effect">Enter Effect (max 14 chars):</label>
                <input type="text" id="custom-effect" name="custom-effect" maxlength="14" placeholder="Enter effect name..." class="custom-effect-field" list="recent-effects-list" autocomplete="off">
                <datalist id="recent-effects-list">
                    <!-- Recent effects will be populated here -->
                </datalist>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 12px;">
                <span>Countdown on turn:</span>
                <label class="radio-label" style="display: inline-flex; align-items: center; margin-bottom: 0;">
                    <input type="radio" name="expiresAt" value="start" checked>
                    <span>Beginning</span>
                </label>
                <label class="radio-label" style="display: inline-flex; align-items: center; margin-bottom: 0;">
                    <input type="radio" name="expiresAt" value="end">
                    <span>End</span>
                </label>
            </div>
            <div class="form-group">
                <label for="effect-note">Note (optional, max 14 chars):</label>
                <input type="text" id="effect-note" name="note" maxlength="14" placeholder="Short description">
            </div>
            <div class="modal-footer-actions">
                <button type="button" class="btn btn-secondary" data-modal-close>
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                    Set Effect
                </button>
                <!-- Batch apply button (hidden by default) -->
                <button type="button"
                        class="btn btn-primary"
                        id="effect-batch-apply-btn"
                        style="display: none;"
                        data-action="batch-effect">
                    Apply to Selected (<span id="effect-batch-count">0</span>)
                </button>
            </div>
        </form>
    </div>
</div>
