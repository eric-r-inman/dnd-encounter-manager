<!-- Creature Database Modal -->
<div class="modal-overlay" style="display: none;"
    data-modal="creature-database"
    data-modal-type="database"
    data-modal-category="reference">
    <div class="modal modal-large">
        <div class="modal-header">
            <h2>📚 Compendium</h2>
            <button class="modal-close" aria-label="Close modal" data-modal-close>&times;</button>
        </div>
        <div class="modal-body modal-database-body">
            <!-- File Status and Import/Export Controls -->
            <div class="database-file-controls" style="display: flex; align-items: center; gap: var(--spacing-md); padding: var(--spacing-md); background: var(--color-bg-secondary); border-radius: var(--border-radius); margin-bottom: var(--spacing-md);">
                <span style="font-weight: var(--font-weight-bold); color: var(--color-text-secondary);">File:</span>
                <span id="creature-database-filename" style="color: var(--color-text-primary);">creature-database.json</span>
                <span id="creature-database-unsaved-indicator"
                      style="display: none; color: var(--color-danger); font-size: var(--font-size-lg); cursor: help;"
                      title="New compendium not exported.">❗</span>
                <div style="margin-left: auto; display: flex; gap: var(--spacing-sm);">
                    <button class="btn btn-sm btn-primary" data-action="import-creature-database" title="Import creature database from JSON file">
                        📥 Import Database
                    </button>
                    <button class="btn btn-sm btn-primary" data-action="export-creature-database" title="Export creature database to JSON file">
                        📤 Export Database
                    </button>
                    <button class="btn btn-sm btn-secondary" data-action="reset-creature-database" title="Reset to the original base database">
                        ↺ Reset to Base
                    </button>
                </div>
            </div>

            <!-- Search and Filter Bar -->
            <div class="database-controls">
                <div class="database-search-bar">
                    <input type="text"
                        id="creature-search"
                        class="database-search-input"
                        placeholder="🔍 Search creatures by name, type, or CR..."
                        data-action="search-creatures">
                    <select id="creature-sort-filter"
                            class="database-filter-select"
                            data-action="change-sort-filter">
                        <option value="alphabetical" selected>Alphabetical (A-Z)</option>
                        <option value="by-cr">By CR</option>
                        <option value="newest">Newest First</option>
                    </select>
                    <button class="btn btn-success btn-sm" data-action="add-new-creature">
                        ➕ New Creature
                    </button>
                    <button class="btn btn-primary btn-sm" data-action="import-creature">
                        📥 Import
                    </button>
                    <button class="btn btn-primary btn-sm" data-action="import-stat-block">
                        📋 Paste
                    </button>
                </div>

                <!-- Type Filter (always visible) -->
                <div id="type-filter" class="filter-panel">
                    <div class="filter-panel-content">
                        <label style="font-weight: bold; margin-right: 10px;">Filter by Type:</label>
                        <label class="checkbox-label"><input type="checkbox" name="type-filter" value="player" checked> Player</label>
                        <label class="checkbox-label"><input type="checkbox" name="type-filter" value="enemy" checked> Enemy</label>
                        <label class="checkbox-label"><input type="checkbox" name="type-filter" value="npc" checked> NPC</label>
                        <button class="btn btn-sm btn-secondary" data-action="clear-type-filter" style="margin-left: 10px;">Show All</button>
                    </div>
                </div>

                <!-- CR Range Filter (hidden by default) -->
                <div id="cr-range-filter" class="filter-panel" style="display: none;">
                    <div class="filter-panel-content">
                        <label>CR Range:</label>
                        <input type="number"
                            id="cr-min"
                            placeholder="Min CR"
                            min="0"
                            max="30"
                            step="0.125"
                            style="width: 80px;">
                        <span>to</span>
                        <input type="number"
                            id="cr-max"
                            placeholder="Max CR"
                            min="0"
                            max="30"
                            step="0.125"
                            style="width: 80px;">
                        <button class="btn btn-sm btn-primary" data-action="apply-cr-filter">Apply</button>
                        <button class="btn btn-sm btn-secondary" data-action="clear-cr-filter">Clear</button>
                    </div>
                </div>
            </div>

            <!-- Two-column layout: List and Details -->
            <div class="database-content">
                <!-- Creature List (Left Column) -->
                <div class="creature-list-column">
                    <div class="creature-list-header">
                        <span class="list-count">Showing <span id="visible-count">0</span> of <span id="total-count">0</span> creatures</span>
                    </div>
                    <div id="creature-list" class="creature-list-container">
                        <!-- Virtual scrolling container - creatures will be dynamically loaded here -->
                        <div class="creature-list-viewport">
                            <!-- Sample creature items for reference -->
                            <div class="creature-list-item" data-creature-id="orc-warrior">
                                <div class="creature-item-header">
                                    <span class="creature-name creature-name-enemy">Orc Warrior</span>
                                    <span class="creature-type-badge badge-enemy">Enemy</span>
                                </div>
                                <div class="creature-item-stats">
                                    <span class="creature-stat">AC: 14</span>
                                    <span class="creature-stat">HP: 25</span>
                                    <span class="creature-stat">CR: 1/2</span>
                                </div>
                            </div>
                            <div class="creature-list-item selected" data-creature-id="ancient-red-dragon">
                                <div class="creature-item-header">
                                    <span class="creature-name creature-name-enemy">Ancient Red Dragon</span>
                                    <span class="creature-type-badge badge-enemy">Enemy</span>
                                </div>
                                <div class="creature-item-stats">
                                    <span class="creature-stat">AC: 22</span>
                                    <span class="creature-stat">HP: 507</span>
                                    <span class="creature-stat">CR: 24</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Creature Details (Right Column) -->
                <div class="creature-details-column">
                    <div class="creature-details-header">
                        <h3 id="detail-creature-name">Select a creature</h3>
                        <div class="creature-actions">
                            <button class="btn btn-sm btn-primary" data-action="edit-creature" style="display: none;">
                                ✏️ Edit
                            </button>
                            <button class="btn btn-sm btn-success" data-action="add-to-encounter" style="display: none;">
                                ➕ Add to Encounter
                            </button>
                            <button class="btn btn-sm btn-danger" data-action="delete-creature" style="display: none;">
                                🗑️ Delete
                            </button>
                        </div>
                    </div>
                    <div id="creature-details-content" class="creature-details-content">
                        <!-- Details will be loaded here when a creature is selected -->
                        <div class="empty-state">
                            <p>Select a creature from the list to view details</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
