<!-- HP Modification Modal -->
<div class="modal-overlay" style="display: none;"
    data-modal="hp-modification"
    data-modal-type="form"
    data-modal-category="combat">
    <div class="modal" style="max-width: 400px;">
        <div class="modal-header">
            <h2><span id="hp-action-type">Damage</span> <span data-target-name>Thorin Ironforge</span></h2>
            <button class="modal-close" aria-label="Close modal" data-modal-close>&times;</button>
        </div>
        <form class="modal-body"
            data-modal-form="hp-modification"
            data-form-type="hp-modification"
            novalidate>
            <div class="form-group">
                <label for="hp-amount"><span id="hp-action-label">Damage</span> Amount:</label>
                <input type="number"
                    id="hp-amount"
                    name="amount"
                    placeholder="Enter amount"
                    min="0"
                    max="999"
                    required
                    autofocus>
                <small id="hp-help-text" style="color: var(--color-text-muted);">
                    Current HP: <span id="current-hp-display">24</span> / <span id="max-hp-display">40</span>
                    <span id="temp-hp-display" style="display: none;"> (Temp: <span id="temp-hp-value">0</span>)</span>
                </small>
            </div>

            <!-- Auto-Save Feature -->
            <div class="form-group" id="auto-save-section" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--color-border-muted);">
                <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                    <!-- Roll Save Toggle -->
                    <label style="display: flex; align-items: center; gap: 8px; margin: 0;">
                        <input type="checkbox" id="roll-save-toggle" name="rollSave" style="width: 18px; height: 18px;">
                        <span style="font-weight: 500;">Roll Save</span>
                    </label>

                    <!-- Save Configuration Fields (hidden by default) -->
                    <div id="save-config-fields" style="display: none; flex: 1; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                        <!-- Ability Select -->
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <label for="save-ability" style="margin: 0; font-size: 0.9em;">Ability:</label>
                            <select id="save-ability" name="saveAbility" style="padding: 4px 8px; font-size: 0.9em;">
                                <option value="con" selected>Con</option>
                                <option value="dex">Dex</option>
                                <option value="str">Str</option>
                                <option value="wis">Wis</option>
                                <option value="int">Int</option>
                                <option value="cha">Cha</option>
                            </select>
                        </div>

                        <!-- Modifier Display/Input -->
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <label for="save-modifier" style="margin: 0; font-size: 0.9em;">Mod:</label>
                            <input type="text"
                                   id="save-modifier"
                                   name="saveModifier"
                                   value="+0"
                                   style="width: 45px; padding: 4px; text-align: center; font-size: 0.9em;"
                                   pattern="[+-]?\d+"
                                   title="Enter modifier (e.g., +2, -1, 0)">
                        </div>

                        <!-- DC Input -->
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <label for="save-dc" style="margin: 0; font-size: 0.9em;">DC:</label>
                            <input type="number"
                                   id="save-dc"
                                   name="saveDC"
                                   value="13"
                                   min="1"
                                   max="30"
                                   style="width: 50px; padding: 4px; text-align: center; font-size: 0.9em;">
                        </div>

                        <!-- Damage Reduction Select -->
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <label for="damage-reduction" style="margin: 0; font-size: 0.9em;">On Save:</label>
                            <select id="damage-reduction" name="damageReduction" style="padding: 4px 8px; font-size: 0.9em;">
                                <option value="0.25">25% avoided</option>
                                <option value="0.5" selected>50% avoided</option>
                                <option value="0.75">75% avoided</option>
                                <option value="1">100% avoided</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Hidden fields to track action type and combatant -->
            <input type="hidden" name="actionType" id="hp-action-type-field" value="damage">
            <input type="hidden" name="combatantId" id="hp-combatant-id" value="">

            <div class="modal-footer-actions">
                <button type="button" class="btn btn-secondary" data-modal-close>
                    Cancel
                </button>
                <button type="submit" class="btn" id="hp-submit-btn">
                    Apply
                </button>
                <!-- Batch apply button (hidden by default) -->
                <button type="button"
                        class="btn"
                        id="hp-batch-apply-btn"
                        style="display: none;"
                        data-action="batch-hp-modification">
                    Apply to Selected (<span id="batch-count">0</span>)
                </button>
            </div>

            <!-- HP History Section -->
            <div class="hp-history-section" id="hp-history-section">
                <h4 class="hp-history-title" id="hp-history-title">Damage History</h4>
                <div class="hp-history-list" id="hp-history-list">
                    <!-- History entries will be populated here -->
                </div>
            </div>
        </form>
    </div>
</div>
