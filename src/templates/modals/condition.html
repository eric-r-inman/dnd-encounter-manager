<!-- Condition Modal -->
<div class="modal-overlay" style="display: none;"
     data-modal="condition"
     data-modal-type="form"
     data-modal-category="status"
     data-modal-purpose="condition-application">
    <div class="modal">
        <div class="modal-header">
            <h2>Set Condition for <span data-target-name>Thorin Ironforge</span></h2>
            <button class="modal-close" aria-label="Close modal" data-modal-close>&times;</button>
        </div>
        <form class="modal-body"
              data-modal-form="condition"
              data-form-type="condition-application"
              data-form-validation="conditional"
              novalidate>
            <div class="form-group">
                <label for="condition-turns">Set Counter (turns):</label>
                <div class="duration-input-group">
                <button type="button"
                        class="infinity-btn"
                        title="Set infinite duration"
                        data-action="toggle-infinity"
                        data-toggle-target="condition-turns"
                        data-infinity-state="false">∞</button>
                    <input type="number"
                           id="condition-turns"
                           name="turns"
                           placeholder="Enter number of turns"
                           min="0"
                           max="100"
                           value="1"
                           data-field-type="duration"
                           data-can-be-infinite="true">
                </div>
            </div>
            <div class="form-group">
                <label for="condition-note">Note (optional, max 14 chars):</label>
                <input type="text"
                       id="condition-note"
                       name="note"
                       maxlength="14"
                       placeholder="Short description"
                       data-field-type="note"
                       data-validation="maxlength"
                       data-char-counter="true">
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 12px;">
                <span>Countdown on turn:</span>
                <label class="radio-label" style="display: inline-flex; align-items: center; margin-bottom: 0;">
                    <input type="radio" name="expiresAt" value="start" checked>
                    <span>Beginning</span>
                </label>
                <label class="radio-label" style="display: inline-flex; align-items: center; margin-bottom: 0;">
                    <input type="radio" name="expiresAt" value="end">
                    <span>End</span>
                </label>
            </div>
            <div class="form-group">
                <label>Select Condition:</label>
                <div class="condition-grid" data-selection-type="radio" data-selection-required="true">
                    <label class="condition-option" data-condition-type="vision">
                        <input type="radio" name="condition" value="Blinded" data-condition-category="sensory">
                        <span>Blinded</span>
                    </label>
                    <label class="condition-option" data-condition-type="mental">
                        <input type="radio" name="condition" value="Charmed" data-condition-category="mental">
                        <span>Charmed</span>
                    </label>
                    <label class="condition-option" data-condition-type="sensory">
                        <input type="radio" name="condition" value="Deafened" data-condition-category="sensory">
                        <span>Deafened</span>
                    </label>
                    <label class="condition-option" data-condition-type="mental">
                        <input type="radio" name="condition" value="Frightened" data-condition-category="mental">
                        <span>Frightened</span>
                    </label>
                    <label class="condition-option" data-condition-type="movement">
                        <input type="radio" name="condition" value="Grappled" data-condition-category="movement">
                        <span>Grappled</span>
                    </label>
                    <label class="condition-option" data-condition-type="action">
                        <input type="radio" name="condition" value="Incapacitated" data-condition-category="action">
                        <span>Incapacitated</span>
                    </label>
                    <label class="condition-option" data-condition-type="advantage">
                        <input type="radio" name="condition" value="Invisible" data-condition-category="advantage">
                        <span>Invisible</span>
                    </label>
                    <label class="condition-option" data-condition-type="severe">
                        <input type="radio" name="condition" value="Paralyzed" data-condition-category="severe">
                        <span>Paralyzed</span>
                    </label>
                    <label class="condition-option" data-condition-type="severe">
                        <input type="radio" name="condition" value="Petrified" data-condition-category="severe">
                        <span>Petrified</span>
                    </label>
                    <label class="condition-option" data-condition-type="physical">
                        <input type="radio" name="condition" value="Poisoned" data-condition-category="physical">
                        <span>Poisoned</span>
                    </label>
                    <label class="condition-option" data-condition-type="movement">
                        <input type="radio" name="condition" value="Prone" data-condition-category="movement">
                        <span>Prone</span>
                    </label>
                    <label class="condition-option" data-condition-type="movement">
                        <input type="radio" name="condition" value="Restrained" data-condition-category="movement">
                        <span>Restrained</span>
                    </label>
                    <label class="condition-option" data-condition-type="severe">
                        <input type="radio" name="condition" value="Stunned" data-condition-category="severe">
                        <span>Stunned</span>
                    </label>
                    <label class="condition-option" data-condition-type="severe">
                        <input type="radio" name="condition" value="Unconscious" data-condition-category="severe">
                        <span>Unconscious</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer-actions">
                <button type="button" class="btn btn-secondary" data-modal-close data-action="cancel-form">
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                    Set Condition
                </button>
                <!-- Batch apply button (hidden by default) -->
                <button type="button"
                        class="btn btn-primary"
                        id="condition-batch-apply-btn"
                        style="display: none;"
                        data-action="batch-condition">
                    Apply to Selected (<span id="condition-batch-count">0</span>)
                </button>
            </div>
        </form>
    </div>
</div>
